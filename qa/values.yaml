# set at least 2 replicas
replicas: 2

ingress:
  enabled: true
  # Set path in RegEx
  path: /

pod:
  targetPort: 5001
  port: 80

awsSecretName: aws-monitor-secret

externalSecret:
  enabled: false
  secretStoreName: aws-secret-store
  region: us-east-1
  awsSecretManagerName: aws-monitor


resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
    ephemeralStorage: "100Mi"

  limits:
    cpu: "500m"
    memory: "512Mi"
    ephemeralStorage: "1Gi"

hpa:
  enabled: false
  maxReplicas: 12
  minReplicas: 6
  avgCPUUtilization: 80
  avgMemoryUtilization: 80

networkPolicy:
  enabled: true

pdb:
  maxUnavailable: 25%

podMonitor:
  enabled: true
  env: dev
  release: prometheus
  namespace: monitoring
  path: /metrics
  interval: 15s
  scrapeTimeout: 10s


serviceMonitor:
  enabled: true
  env: dev
  release: prometheus
  namespace: monitoring
  path: /metrics
  interval: 15s
  scrapeTimeout: 10s

securityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001