---
# Source: AWS-Monitor/templates/networkPolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aws-monitor-np
  labels:
    
    generator: helm
    name: aws-monitor
spec:
  podSelector:
    matchLabels:
      app: aws-monitor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5001
  egress:
  - {}
---
# Source: AWS-Monitor/templates/pdb.yaml
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aws-monitor-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: aws-monitor
---
# Source: AWS-Monitor/templates/service.yaml
kind: Service     
apiVersion: v1     
metadata:
  name: aws-monitor-svc
  labels:
    app: aws-monitor
    
    generator: helm
    name: aws-monitor
spec:
  selector:
    app: aws-monitor
    
    generator: helm
    name: aws-monitor
  
  type: ClusterIP
  
  ports:         
  - name: http   
    protocol: TCP
    port: 80
    targetPort: 5001

---
# Source: AWS-Monitor/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-monitor-deploy
  labels:
    
    generator: helm
    name: aws-monitor
spec:  
  selector: 
    matchLabels:
      app: aws-monitor
      
      generator: helm
      name: aws-monitor
  
  replicas: 3
  
  template:
    metadata:
      labels:
        app: aws-monitor
        
        generator: helm
        name: aws-monitor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
      - name: aws-monitor
        image: sm1986/aws-monitor:1.0.16-qa
        imagePullPolicy: Always

        readinessProbe:
          httpGet:
            path: /
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          tcpSocket: # validate if pod alive via tcp connection
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 20




        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          privileged: false
          capabilities:
            drop:
              - ALL
        ports:
        - name: http 
          containerPort: 5001
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-monitor-secret
                key: AWS_ACCESS_KEY_ID

          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-monitor-secret
                key: AWS_SECRET_ACCESS_KEY


        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
            ephemeral-storage: "100Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
            ephemeral-storage: "1Gi"
---
# Source: AWS-Monitor/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aws-monitor-ing
  labels:
    
    generator: helm
    name: aws-monitor
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
       paths:
        - path: "/qa(/|$)(.*)"
          pathType: ImplementationSpecific
          backend:
            service:
              name: aws-monitor-svc
              port:
                 number: 80


---
# Source: AWS-Monitor/templates/podMonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: aws-monitor-pm
  namespace: monitoring
  labels:
    release: prometheus
    
    generator: helm
    name: aws-monitor
spec:
  selector:
    matchLabels:
      app: aws-monitor

  namespaceSelector:
    matchNames:
    - default

  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
# Source: AWS-Monitor/templates/serviceMonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aws-monitor-sm
  namespace: monitoring
  labels:
    release: prometheus
    
    generator: helm
    name: aws-monitor
spec:
  selector:
    matchLabels:
      app: aws-monitor

  namespaceSelector:
    matchNames:
    - default

  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
